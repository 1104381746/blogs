name: Trigger Hugo Build

on:
  push:
    branches:
      - main
    paths:
      - 'blogs/**'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hugo-blog deploy
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.BLOGS_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/1104381746/hugo-blog/dispatches \
            -d '{"event_type":"blogs-updated"}'
